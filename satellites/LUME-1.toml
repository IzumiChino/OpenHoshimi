# LUME-1 satellite definition.
#
# Reference: https://gr-satellites.readthedocs.io/en/latest/supported_satellites.html
#       https://nanosats.eu/sat/lume-1
#https://db.satnogs.org/satellite/43804
#
# 1U CubeSat from the University of Vigo (Spain), launched 2018-12-03
# on PSLV-C43 alongside SNUGLITE. IARU-coordinated. Beacon downlink is
# 9600 bd GMSK on 437.250 MHz, using a GOMspace NanoCom AX100 transceiver
# in ASM+Golay mode: a 32-bit attached sync marker, followed by a
# Golay(24,12) header carrying the encoded payload length, then a
# CCSDS-randomized shortened RS(255,223) codeword.
#
# Telemetry layout follows daniestevez/gr-satellites' lume telemetry
# parser, which decodes a CSP-wrapped CCSDS TM transfer frame carrying an
# ECSS PUS [3,25] housekeeping packet. Byte layout of the prefix:
#
#   off  0..3   CSP header                        (4 B)
#   off  4..8   CCSDS TM transfer frame header    (5 B - 40 bits packed)
#   off  9..14  CCSDS Space Packet primary header (6 B)
#   off 15..21  ECSS PUS TM secondary header      (7 B)
#   off 22..27  PUS time field (day:u16, ms:u32)  (6 B)
#   off 28..29  payload id (u16be)                (2 B - discriminator)
#   off 30..    variant payload (OBC/EPS/TTC+GSSB/AOCS/Temps by id)
#
# Five variants are defined keyed by the payload id:
#   id=1 OBC, id=2 EPS, id=3 TTC+GSSB, id=4 AOCS, id=5 Temps.
# Temperatures encoded as `LinearAdapter(10, Int16sb)` in the gr-satellites
# construct surface here as signed s16be with `scale = 0.1` and unit "C";
# 32-bit IEEE-754 fields surface as `encoding = "float32"`.

[satellite]
name = "LUME-1"
aliases = ["LUME1", "LUME 1"]
norad_id = 43804

[[downlink]]
label = "9k6 GMSK telemetry beacon"
freq_hz = 437_250_000
modulation = "GMSK"
baudrate = 9600
framing = "GOMSPACE_AX100"
telemetry_schema = "lume_1"

[downlink.modem]
kind = "cpm"
mode = "gmsk"
modulation_index = 0.5
gaussian_bt = 0.5
frequency_offset_hz = 0.0
differential = false
invert = false
swap_iq = false

[downlink.framer]
kind = "ax100_asm"
# Conservative ASM correlation threshold: tolerate up to 4 bit errors in
# the 32-bit syncword.
threshold = 4

[downlink.fec]
kind = "ax100"

[downlink.codec]
kind = "gomspace_ax100"
mode = "asm_golay"

# Telemetry schema for LUME-1's CSP+CCSDS+PUS HK packets, mirroring the
# gr-satellites lume.py construct (Daniel Estevez, GPL-3.0). prefix_skip = 30
# strips the CSP header (4 B) + CCSDS TM transfer frame header (5 B) +
# CCSDS Space Packet primary header (6 B) + ECSS PUS TM secondary header
# (7 B) + PUS time field (6 B) + payload id (2 B) so that body offset 0
# is the first byte of the variant payload. The discriminator at raw
# offset 28 (length=2, big endian) selects one of five payloads:
# id=1 OBC, id=2 EPS, id=3 TTC+GSSB, id=4 AOCS, id=5 Temps. Temperatures
# encoded as `LinearAdapter(10, Int16sb)` in the gr-satellites construct
# surface here as signed s16be with `scale = 0.1` and unit "C";
# 32-bit IEEE-754 fields surface as `encoding = "float32"`. Long blob
# fields (e.g. OBC `om_sw_version`, EPS `output_off_delta` arrays) and
# fields whose engineering units are not documented are omitted to keep
# the GUI readable; raw bytes can be inspected upstream of the parser.

[telemetry.lume_1]
prefix_skip = 30
# Restrict this schema to the documented HK frame sizes (prefix 30 +
# variant body 74 / 85 / 92 / 124 / 129 bytes for TTC+GSSB / AOCS /
# Temps / OBC / EPS). Frames of any other length are not LUME-1 HK
# telemetry and must not be decoded with this layout.
match_lengths = [104, 115, 122, 154, 159]

[telemetry.lume_1.discriminator]
offset = 28
length = 2
endian = "big"

