# IO-117 / GreenCube satellite definition.
#
# Reference: https://gr-satellites.readthedocs.io/en/latest/supported_satellites.html
#            https://www.qrz.com/db/IS0GRB
#            https://www.amsat.org/news/2023/02/13/greencube-given-international-designator-io-117/
#
# Italian 1U CubeSat from Sapienza University of Rome (S5Lab),
# launched 2022-07-13 on Vega-C from Kourou. Coordinated by IARU as
# IO-117 in 2023 once the amateur digital store-and-forward bulletin
# board was opened to all licensed amateurs. The satellite occupies a
# medium Earth orbit (~6000 km), giving it intercontinental footprints
# rare for an amateur cubesat and making it one of the most popular
# amateur digital satellites in operation.
#
# Downlink at 435.310 MHz uses plain FSK with the GOMspace AX100
# framing (32-bit attached sync marker 0x930B51DE, 3-byte Golay(24,12)
# header, 255-byte CCSDS-randomised RS(255,223) codeword). The SatNOGS
# transmitter database labels these as "GMSK" colloquially, but the
# gr-satellites GREENCUBE definition and the on-air signal are
# rectangular-pulse FSK (no transmit Gaussian filter); the matched
# receive filter is therefore a square-pulse / integrate-and-dump
# stage, not a Gaussian one. Configuring the runtime modem with plain
# FSK and no `gaussian_bt` selects that path.
#
# gr-satellites lists six baudrate variants (300, 600, 1k2, 2k4, 4k8,
# 9k6); operationally the digipeater runs at 1k2 most of the time, with
# experimental 9k6 slots announced by the operator. We declare two
# downlink rows so the GUI can pick the one matching the recording.
#
# Telemetry interpretation is intentionally omitted: the on-orbit packet
# format is documented in the GreenCube user manual but is not yet wired
# up here. The decode chain stops at the AX100 codec, surfacing the
# decoded RS(255,223) payload + corrected-error count for inspection.

[satellite]
name = "IO-117"
aliases = ["GreenCube", "GREENCUBE", "ITASAT-2"]
norad_id = 53106

# Telemetry layout follows tomvdb/tlm-greencube-plugin's Kaitai struct,
# which derives from S5Lab's published decoding notes for LEDSAT/GreenCube.
# Each AX100 RS(255,223)-decoded payload is a 101-byte CSP frame: a 4-byte
# CSP header, a 16-bit big-endian telemetry id (`tlm_id`, valid values
# 13840 / 13841 / 13842 / 30234), and a 95-byte fixed-format housekeeping
# block. Voltages, currents and GPS coordinates are surfaced as raw
# big-endian integers because the on-orbit calibration constants are not
# in the public documentation; temperatures are signed-int8 in deg C.

[[downlink]]
label = "1k2 FSK digipeater"
freq_hz = 435_310_000
modulation = "FSK"
baudrate = 1200
framing = "GOMSPACE_AX100"
telemetry_schema = "io117"

[downlink.modem]
kind = "cpm"
mode = "fsk"
modulation_index = 0.5
frequency_offset_hz = 0.0
differential = false
invert = false
swap_iq = false

[downlink.framer]
kind = "ax100_asm"
threshold = 4

[downlink.codec]
kind = "gomspace_ax100"
mode = "asm_golay"

[[downlink]]
label = "9k6 FSK digipeater"
freq_hz = 435_310_000
modulation = "FSK"
baudrate = 9600
framing = "GOMSPACE_AX100"
telemetry_schema = "io117"

[downlink.modem]
kind = "cpm"
mode = "fsk"
modulation_index = 0.5
frequency_offset_hz = 0.0
differential = false
invert = false
swap_iq = false

[downlink.framer]
kind = "ax100_asm"
threshold = 4

[downlink.codec]
kind = "gomspace_ax100"
mode = "asm_golay"

# Telemetry schema for the IO-117 / GreenCube 101-byte CSP frame, mirroring
# tomvdb/tlm-greencube-plugin's Kaitai layout (MIT, S5Lab decoding notes for
# LEDSAT/GreenCube). prefix_skip = 4 strips the CSP header so body offset 0
# is the first byte of the 97-byte (tlm_id + tlm_data) telemetry block.
#
# Calibration constants for the EPS rails, currents and GPS coordinates are
# not in the public docs, so those fields surface raw counts. Temperatures
# are signed int8 deg C per the Kaitai struct. The GPS fix-time and
# lat/lon/alt fields are documented as u4be raw counters; we expose them
# as-is.

[telemetry.io117]
prefix_skip = 4
# IO-117 multiplexes 101-byte HK telemetry with arbitrary-length
# store-and-forward digipeater traffic over the same AX.100 framing.
# Restrict this schema to the documented HK frame size (Kaitai struct
# `case 101:`). Frames of any other length are not telemetry and must
# not be decoded with this layout.
match_lengths = [101]

# tlm_id discriminator at raw offset 4 (immediately after the 4-byte
# CSP header). The Kaitai struct validates the value is one of
# 13840 / 13841 / 13842 / 30234; any other value is rejected.
[telemetry.io117.discriminator]
offset = 4
length = 2
endian = "big"

# Single HK variant covering all four documented `tlm_id` values.
# `match_values` lets one field list serve every legal id without
# duplicating the 52-field block four times.
[[telemetry.io117.variant]]
name = "hk"
match_values = [13840, 13841, 13842, 30234]

[[telemetry.io117.variant.field]]
name = "tlm_id"
group = "csp"
offset = 0
length = 2
endian = "big"

[[telemetry.io117.variant.field]]
name = "unix_time_ms"
group = "time"
offset = 2
length = 2
endian = "big"
unit = "ms"

